<!DOCTYPE html>
<html>
<head>
<title>Login - Cloud Platform</title>
<style>
body{
    font-family: Arial;
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
form{
    background:white;
    padding:30px;
    border-radius:8px;
    box-shadow:0 2px 8px rgba(0,0,0,0.2);
}
input{
    display:block;
    margin:10px 0;
    padding:10px;
    width:220px;
}
button{
    padding:10px;
    width:100%;
    background:#007bff;
    color:white;
    border:none;
}
</style>
</head>
<body>

<form method="POST" action="/login">
<h2>Cloud Platform Login</h2>
<input name="username" placeholder="Username" required>
<input name="password" type="password" placeholder="Password" required>
<button type="submit">Login</button>
</form>

</body>
</html>
